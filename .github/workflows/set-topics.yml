name: Set repo topics (one-off)
on:
  workflow_dispatch:

jobs:
  set-topics:
    runs-on: ubuntu-latest
    steps:
      - name: Set topics via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -sS -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/topics" \
            -d '{"names":["notion","notion-api","notion-sdk","data-source","database","migration","compatibility","typescript"]}' \
            -w "\nHTTP_STATUS:%{http_code}\n" \
            -o response.json
          echo "--- response body ---"
          cat response.json
